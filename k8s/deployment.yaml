apiVersion: apps/v1
kind: Deployment
metadata:
  name: reset-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reset-api
  template:
    metadata:
      labels:
        app: reset-api
    spec:
      containers:
      - name: reset-container
        image: nisha1114/password-reset:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: reset-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30001
  selector:
    app: reset-api